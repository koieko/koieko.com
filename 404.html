<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light only">
<meta name="supported-color-schemes" content="light">
<meta name="robots" content="noindex">
<title>404 — ページが見つかりません ｜ 鯉江 昂</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.png" sizes="any">
<link rel="apple-touch-icon" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;500&family=Shippori+Mincho:wght@400;500&display=swap&subset=japanese,latin" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
<style>
  .nf{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
  .nf .mark{width:96px;height:96px;margin-bottom:30px;color:var(--ink);}
  .nf .mark svg,.nf .mark img{width:100%;height:100%;display:block;user-select:none;-webkit-user-select:none;-webkit-user-drag:none;pointer-events:none;}
  .nf .code{font-family:var(--display);font-size:clamp(2.4rem,8vw,4rem);font-weight:500;line-height:1;margin-bottom:18px;}
  .nf p{color:var(--ink2);font-size:.95rem;margin-bottom:36px;}
  .nf a{font-size:.85rem;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--ink);padding-bottom:4px;transition:opacity .2s;}
  .nf a:hover{opacity:.5;}
</style>
</head>
<body>
<section class="nf">
  <span class="mark"><img src="favicon.svg" width="96" height="96" alt="" aria-hidden="true" draggable="false"></span>
  <div class="code">404</div>
  <p>お探しのページは見つかりませんでした。</p>
  <a href="/">ホームへ戻る →</a>
</section>
</body>
</html>
